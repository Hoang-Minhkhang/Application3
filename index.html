<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Application3 - Hoàng Minh Khang 1995</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f9f9f9;
      margin: 0;
      padding: 50px;
    }
    h1 { color: #333; }
    p { font-size: 18px; color: #555; }
    .download-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 18px;
      color: #fff;
      background-color: #0078d7;
      border: none;
      border-radius: 5px;
      text-decoration: none;
      cursor: pointer;
    }
    .download-btn:hover { background-color: #005a9e; }
    #downloads { display: none; margin-top: 30px; }
  </style>
</head>
<body>
  <h1>Chào mừng đến với Application3</h1>
  <p>Nhập mật khẩu để tải ứng dụng:</p>

  <input type="password" id="pwd" placeholder="Mật khẩu">
  <button class="download-btn" onclick="checkPwd()">Xác nhận</button>

  <div id="downloads">
    <a href="app.publish/Application3.application" class="download-btn">Tải ứng dụng (ClickOnce)</a>
    <br><br>
    <a href="app.publish/setup.exe" class="download-btn">Tải file Setup trực tiếp</a>
    <p style="margin-top:40px; font-size:14px; color:#777;">
      Lưu ý: Đây là ứng dụng ClickOnce. Sau khi tải file <code>.application</code>, 
      hãy mở file đó để bắt đầu quá trình cài đặt.<br>
      Nếu gặp lỗi, bạn có thể tải file <code>setup.exe</code> để cài đặt trực tiếp.
    </p>
  </div>

  <script>
    function checkPwd() {
      var pwd = document.getElementById("pwd").value;
      if (pwd === "**********") { // đổi mật khẩu tại đây
        document.getElementById("downloads").style.display = "block";
      } else {
        alert("Sai mật khẩu!");
      }
    }
  </script>
</body>
</html>
